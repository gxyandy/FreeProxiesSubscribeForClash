name: Update test

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest Clash subscription into test
        run: |
          python - <<'PY'
          import re
          import sys
          import urllib.request
          from html import unescape
          from pathlib import Path

          QUERY_PAGE_URL = "https://blue2sea.com/order/querySubscriptionLink/%20"
          OUTPUT_FILE = Path("test")

          PAGE_HEADERS = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 (KHTML, like Gecko) "
                  "Chrome/125.0 Safari/537.36"
              ),
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
          }

          CLASH_HEADERS = {
              "User-Agent": "clash-verge/v2.5.1",
              "Accept": "*/*",
          }

          def fetch_bytes(url, headers):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return response.read(), response.headers.get_content_charset() or "utf-8"

          def fetch_text(url, headers):
              data, charset = fetch_bytes(url, headers)
              return data.decode(charset, errors="replace")

          page_text = unescape(fetch_text(QUERY_PAGE_URL, PAGE_HEADERS))

          match = re.search(
              r"公共订阅链接为[：:]\s*(https?://[^\s<\"'，。]+)",
              page_text,
              flags=re.IGNORECASE,
          )

          if not match:
              print("没有找到“公共订阅链接为：”后面的订阅地址", file=sys.stderr)
              sys.exit(1)

          subscription_url = match.group(1).strip()
          print(f"提取到订阅地址：{subscription_url}")

          subscription_data, _ = fetch_bytes(subscription_url, CLASH_HEADERS)

          if not subscription_data.strip():
              print("订阅地址返回内容为空", file=sys.stderr)
              sys.exit(1)

          preview = subscription_data[:1000].decode("utf-8", errors="ignore")

          if "<html" in preview.lower() or "<!doctype html" in preview.lower():
              print("抓到的是 HTML 页面，不是 Clash 订阅内容", file=sys.stderr)
              sys.exit(1)

          if "mixed-port:" not in preview and "proxies:" not in preview and "proxy-providers:" not in preview:
              print("抓到的内容不像 Clash 配置，前 1000 字符如下：", file=sys.stderr)
              print(preview, file=sys.stderr)
              sys.exit(1)

          OUTPUT_FILE.write_bytes(subscription_data.rstrip() + b"\n")
          print(f"已把真实 Clash 订阅内容写入 {OUTPUT_FILE}")
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test
          if git diff --cached --quiet; then
            echo "test 没有变化，不需要提交。"
          else
            git commit -m "Update test subscription"
            git push
          fi
