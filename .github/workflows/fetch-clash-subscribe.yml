name: Fetch Clash Subscribe Link

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch tolinkshare2 page and extract subscribe link
        id: extract
        run: |
          curl -sL "https://github.com/tolinkshare2/tolinkshare2.github.io" -o page.html
          SUBSCRIBE_URL=$(grep -oP 'https://[a-zA-Z0-9]+\.tosslk\.xyz/[a-zA-Z0-9]+' page.html | head -1)
          echo "subscribe_url=$SUBSCRIBE_URL" >> $GITHUB_OUTPUT
          if [ -z "$SUBSCRIBE_URL" ]; then exit 1; fi

      - name: Download subscribe content
        id: download
        run: |
          SUBSCRIBE_URL="${{ steps.extract.outputs.subscribe_url }}"
          echo "Downloading from: $SUBSCRIBE_URL"
          
          # 模拟 clash-verge v2.5.2
          curl -sL \
            -A "clash-verge/v2.5.2" \
            -H "Accept: application/yaml, text/yaml, */*" \
            --max-time 30 \
            "$SUBSCRIBE_URL" -o subscribe_content.yaml
          
          # 检查是否被返回了提示文本
          if grep -q "节点加速器\|已停止维护\|官方网站\|更换下载" subscribe_content.yaml; then
            echo "ERROR: Got maintenance notice instead of real nodes"
            cat subscribe_content.yaml
            exit 1
          fi
          
          if [ ! -s subscribe_content.yaml ]; then exit 1; fi
          echo "Size: $(wc -c < subscribe_content.yaml) bytes"

      - name: Update tosslk file
        run: |
          mkdir -p tosslk
          cp subscribe_content.yaml tosslk/tosslk

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add tosslk/
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Update Clash subscribe [$(date '+%Y-%m-%d %H:%M:%S')]
Source: ${{ steps.extract.outputs.subscribe_url }}"
          git push
