name: Fetch Clash Subscribe Link

on:
  # 每 6 小时执行一次
  schedule:
    - cron: '0 */6 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch tolinkshare2 page and extract subscribe link
        id: extract
        run: |
          curl -sL "https://github.com/tolinkshare2/tolinkshare2.github.io" -o page.html
          
          # 提取 tosslk 订阅链接，取第一个
          SUBSCRIBE_URL=$(grep -oP 'https://[a-zA-Z0-9]+\.tosslk\.xyz/[a-zA-Z0-9]+' page.html | head -1)
          
          echo "Extracted URL: $SUBSCRIBE_URL"
          echo "subscribe_url=$SUBSCRIBE_URL" >> $GITHUB_OUTPUT
          
          if [ -z "$SUBSCRIBE_URL" ]; then
            echo "ERROR: Could not extract subscribe URL"
            exit 1
          fi

      - name: Download subscribe content
        id: download
        run: |
          SUBSCRIBE_URL="${{ steps.extract.outputs.subscribe_url }}"
          echo "Downloading from: $SUBSCRIBE_URL"
          
          # 下载订阅内容，模拟 Clash 客户端
          curl -sL \
            -H "User-Agent: ClashForWindows/0.20.39" \
            -H "Accept: */*" \
            --max-time 30 \
            "$SUBSCRIBE_URL" -o subscribe_content.yaml
          
          # 验证内容
          if [ ! -s subscribe_content.yaml ]; then
            echo "ERROR: Downloaded file is empty"
            exit 1
          fi
          
          SIZE=$(wc -c < subscribe_content.yaml)
          echo "Content size: $SIZE bytes"

      - name: Update tosslk file
        run: |
          mkdir -p tosslk
          cp subscribe_content.yaml tosslk/tosslk

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add tosslk/
          
          # 只在有变更时提交
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit"
            exit 0
          fi
          
          git commit -m "Update Clash subscribe [$(date '+%Y-%m-%d %H:%M:%S')]
          
          Source: ${{ steps.extract.outputs.subscribe_url }}"
          
          git push
